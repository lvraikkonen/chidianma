<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>中午吃点啥 · Chrome 扩展设置</title>
    <link rel="stylesheet" href="/styles/tokens.css" />
    <link rel="stylesheet" href="/styles/components.css" />
    <link rel="stylesheet" href="/styles/options.css" />
  </head>
  <body>
    <main class="settings-page">
      <header class="settings-header">
        <a class="brand" href="index.html" aria-label="返回今日推荐">
          <img class="brand-mark" src="/brand-mark.svg" alt="" />
          <span><strong>中午吃点啥</strong><small>Chrome 扩展设置</small></span>
        </a>
        <p id="global-message" class="global-message" aria-live="polite"></p>
      </header>

      <section id="identity-card" class="settings-card" aria-labelledby="identity-title">
        <div class="section-heading"><span>01</span><h1 id="identity-title">连接干饭小组</h1></div>
        <div id="identity-state"></div>
      </section>

      <section id="groups-card" class="settings-card" aria-labelledby="groups-title" hidden>
        <div class="section-heading"><span>02</span><h2 id="groups-title">当前小组</h2></div>
        <div id="group-list" class="group-list"></div>
        <div class="entry-grid">
          <form id="create-group-form" class="stack">
            <h3>创建新小组</h3>
            <label>小组名称<input id="group-name" required maxlength="80" /></label>
            <label>一句话说明<input id="group-subtitle" maxlength="120" /></label>
            <button class="button primary" type="submit">创建小组</button>
          </form>
          <form id="join-group-form" class="stack">
            <h3>用邀请码加入</h3>
            <label>邀请码<input id="invite-code" required autocomplete="off" /></label>
            <button class="button secondary" type="submit">加入小组</button>
          </form>
        </div>
        <div id="invite-result" class="invite-result" aria-live="polite" hidden></div>
      </section>

      <section id="reminder-card" class="settings-card" aria-labelledby="reminder-title" hidden>
        <div class="section-heading"><span>03</span><h2 id="reminder-title">本机提醒</h2></div>
        <div id="reminder-resource-message" class="resource-message" aria-live="polite"></div>
        <div id="group-reminder-defaults" class="reminder-defaults" hidden></div>
        <form id="reminder-form" class="setting-rows">
          <label class="setting-row"><span><strong>本机自定义</strong><small>关闭时跟随小组默认；本机设置始终优先</small></span><input id="reminder-custom-mode" type="checkbox" /></label>
          <label class="setting-row"><span><strong>提醒时间</strong><small>使用办公室所在时区</small></span><input id="reminder-time" type="time" required /></label>
          <label class="setting-row"><span><strong>工作日提醒</strong><small>周一到周五，周末不打扰</small></span><input id="reminder-enabled" type="checkbox" /></label>
          <label class="setting-row"><span><strong>二次提醒</strong><small>主提醒成功 20 分钟后，仅在仍无人决定时提醒</small></span><input id="second-reminder-enabled" type="checkbox" /></label>
          <div class="form-actions">
            <button id="save-reminder-button" class="button primary" type="submit">保存本机设置</button>
            <button id="restore-reminder-button" class="button secondary" type="button">恢复小组默认</button>
            <button id="retry-settings-button" class="button ghost" type="button" hidden>重试加载默认值</button>
          </div>
        </form>
      </section>

      <section id="history-card" class="settings-card" aria-labelledby="history-title" hidden>
        <div class="section-heading"><span>04</span><h2 id="history-title">我的午饭记录</h2></div>
        <div id="history-resource-message" class="resource-message" aria-live="polite"></div>
        <button id="retry-history-button" class="button ghost" type="button" hidden>重试加载记录</button>
        <div id="history-content"></div>
      </section>

      <section class="settings-card build-card" aria-labelledby="build-title">
        <div class="section-heading"><span>05</span><h2 id="build-title">版本与服务</h2></div>
        <dl class="build-details">
          <div><dt>版本</dt><dd id="extension-version"></dd></div>
          <div><dt>服务</dt><dd id="service-origin"></dd></div>
        </dl>
        <p id="build-profile-note"></p>
      </section>

      <details id="advanced-connection-settings" class="settings-card advanced-card" hidden>
        <summary>高级连接设置</summary>
        <form id="api-host-form" class="stack">
          <label>API 地址<input id="api-base-url" type="url" required /></label>
          <p>仅开发版提供，可在 localhost 与生产服务之间切换。更换地址会断开当前身份并清除该服务的分组缓存。</p>
          <button class="button danger" type="submit">更换 API 地址</button>
        </form>
      </details>
    </main>
    <script type="module" src="/src/options.ts"></script>
  </body>
</html>
